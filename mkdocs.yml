site_name: Professional Python Template
site_description: "Professional-grade Python template demonstrating component-based architecture for distributed mail client systems."

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - 'Overview': 'index.md'
  - 'Architecture': 'component.md'
  - 'Testing': 'testing.md'
  - 'CI/CD Setup': 'circleci-setup.md'
  - 'API Reference':
    - 'Mail Client API': 'api/mail_client_api.md'
    - 'Gmail Client Implementation': 'api/gmail_client_impl.md'
    - 'Mail Client Service': 'api/mail_client_service.md'
    - 'Mail Client Adapter': 'api/mail_client_adapter.md'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            docstring_section_style: spacy
            members_order: source
