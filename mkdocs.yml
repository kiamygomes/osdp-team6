site_name: OSDP Jira Service
site_description: "Component-based ticketing microservice with OAuth 2.0 integration for Jira and other ticketing systems."

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - 'Overview': 'index.md'
  - 'Architecture': 'architecture.md'
  - 'Testing': 'testing.md'
  - 'CI/CD Setup': 'circleci-setup.md'
  - 'API Reference':
    - 'Ticket API': 'api/ticket_api.md'
    - 'Ticket Implementation': 'api/ticket_impl.md'
    - 'Ticket Service': 'api/ticket_service.md'
    - 'Ticket Client Generated': 'api/ticket_client_generated.md'
    - 'Ticket Client Adapter': 'api/ticket_client_adapter.md'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src/ticket_api/src
            - src/ticket_impl/src
            - src/ticket_service/src
            - src/ticket_client_generated
            - src/ticket_client_adapter/src
          options:
            show_source: false
            docstring_section_style: spacy
            members_order: source
