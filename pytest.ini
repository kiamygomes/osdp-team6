[pytest]
asyncio_mode = auto
pythonpath =
    .
    src
    src/ticket_api/src
    src/ticket_impl/src
    src/ticket_service/src
    src/ticket_client_adapter/src
    src/ticket_client_generated
    src/ai_adapter/src
    external/claude_team/src/ai_chat_api/src
    external/claude_team/src/ai_chat_adapter/src
    external/openai_team/src/ai_api/src
    external/openai_team/src/ai_adapter/src
testpaths = 
    "tests"
    "src/*/tests"
    "src/ticket_client_adapter/tests"
    "src/ticket_client_generated/tests"

addopts =
    "--cov"
    "--cov-report=term-missing"
    "--cov-report=html"
    "--cov-fail-under=90"
    "--import-mode=importlib"
    "--strict-markers"
    "-v"

markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    circleci: CI/CD compatible tests