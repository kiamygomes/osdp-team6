# Render Blueprint for OSDP Jira Service
# Uses uv for fast, reliable dependency management
# Build: Installs uv and syncs all workspace dependencies
# Start: Runs the FastAPI service with uvicorn
services:
  - type: web
    name: osdp-jira-service
    env: python
    plan: free
    buildCommand: "pip install uv && uv sync --frozen && uv pip list"
    startCommand: ".venv/bin/python -m uvicorn ticket_service.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: OAUTH_REDIRECT_URI
        value: https://osdp-team6.onrender.com/api/v1/auth/callback
      - key: OAUTH_CLIENT_ID
        sync: false  # Set manually in Render dashboard
      - key: OAUTH_CLIENT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: JIRA_CLOUD_ID
        sync: false  # Set manually in Render dashboard
      - key: DB_URL
        fromDatabase:
          name: osdp-jira-db
          property: connectionString
      - key: API_KEY
        generateValue: true  # Render will generate a secure random value
      - key: GRAFANA_CLOUD_URL
        sync: false  # Set manually - your Grafana Cloud Prometheus endpoint
      - key: GRAFANA_CLOUD_USER
        sync: false  # Set manually - your Grafana Cloud instance ID
      - key: GRAFANA_CLOUD_API_KEY
        sync: false  # Set manually - your Grafana Cloud API key

databases:
  - name: osdp-jira-db
    plan: free
    databaseName: osdp_jira_service
    user: osdp_user